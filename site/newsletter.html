<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newsletter — Daylight Computer Club</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#ffffff">
</head>
<body>
<div class="wrap">

  <header class="club">
    <a class="club-mark" href="./">
      <img src="icons/icon-192.png" alt="">
      <h1>The Club Newsletter</h1>
    </a>
    <p class="club-tagline">What the club's been cooking. Drafted by the club robot from our own history.</p>
  </header>

  <main class="prose">
    <h2 style="margin-top:12px">On the shelf right now</h2>
    <div id="shelf"><p class="meta">Loading…</p></div>

    <h2>Past editions</h2>
    <div id="editions"><p class="meta">Loading…</p></div>
  </main>

  <footer class="club">
    <p>New editions are drafted automatically each month. <a href="./">← Back to the club</a></p>
  </footer>

</div>

<script>
const REPO = 'a12k-a2b/daylight-computing-club-community-hub';
const $ = id => document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Live "since forever" snapshot straight from the catalog.
fetch('apps.json').then(r => r.json()).then(data => {
  const apps = (data.apps || []).filter(a => a.id !== 'dcc');
  if (!apps.length) { $('shelf').innerHTML = '<p class="hint">The shelf is empty — for now.</p>'; return; }
  $('shelf').innerHTML = '<p>' + apps.length + ' app' + (apps.length === 1 ? '' : 's') +
    ' on the shelf:</p><ul>' + apps.map(a =>
      '<li><strong>' + esc(a.name) + '</strong> by ' + esc(a.author) +
      ' — ' + esc(a.tagline) + '</li>').join('') + '</ul>';
}).catch(() => { $('shelf').innerHTML = '<p class="hint">Couldn’t load the shelf right now.</p>'; });

// Past robot-drafted editions live as GitHub issues labeled "newsletter".
fetch('https://api.github.com/repos/' + REPO + '/issues?state=all&per_page=100&sort=created&direction=desc')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(all => {
    const issues = all.filter(i => /^Newsletter\b/i.test(i.title || ''));
    if (!issues.length) {
      $('editions').innerHTML = '<p class="hint">No editions yet — the first one drafts at the start of next month.</p>';
      return;
    }
    $('editions').innerHTML = issues.map(n =>
      '<div class="card" style="padding:18px 22px">' +
        '<h2 style="font-size:22px;margin:0 0 8px">' + esc(n.title) + '</h2>' +
        '<p class="meta" style="margin:0 0 10px">' +
          (n.created_at ? new Date(n.created_at).toLocaleDateString() : '') + '</p>' +
        '<p style="white-space:pre-wrap;margin:0">' + esc((n.body || '').slice(0, 1200)) + '</p>' +
        '<p class="meta" style="margin:10px 0 0"><a href="' + n.html_url + '">read the full edition →</a></p>' +
      '</div>').join('');
  })
  .catch(() => {
    $('editions').innerHTML = '<p class="hint">Couldn’t load past editions right now (offline or rate-limited).</p>';
  });
</script>
</body>
</html>
