name: Shelve app submissions

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  shelve:
    if: contains(github.event.issue.labels.*.name, 'app-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install APK signing tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq apksigner zipalign aapt
      - name: Shelve the submission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/shelve.py
