name: Inspector — crash and memory smoke test

# Advisory only: installs a submitted APK on an emulated Android tablet,
# pokes it with 1500 random inputs (monkey), and reports crashes and
# memory use on the PR. It can flake (emulators do) — it never blocks.

on:
  pull_request:
    paths: ["site/apps/**"]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to smoke-test (robot-created PRs can't trigger pull_request workflows)"
        required: true

permissions:
  contents: read
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stash the inspector script from master
        # before switching to the PR branch: the PR may predate smoke.sh —
        # and we never run a submission's own copy of the inspector anyway
        run: cp .github/scripts/smoke.sh "$RUNNER_TEMP/smoke.sh"

      - name: Check out the PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Find the submitted APK
        id: find
        run: |
          # checkout above already fetched full history — a shallow re-fetch
          # here would erase the merge base and make the diff come up empty
          apk=$(git diff --name-only origin/master...HEAD -- 'site/apps/*/*.apk' | head -1)
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "Found: ${apk:-nothing}"

      - name: Enable KVM for the emulator
        if: steps.find.outputs.apk != ''
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install and poke it on an emulated tablet
        if: steps.find.outputs.apk != ''
        id: poke
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          disable-animations: true
          # one line on purpose: the runner executes each script line in its
          # own shell, so all real logic lives in smoke.sh (master's copy,
          # stashed before the PR checkout)
          script: bash "$RUNNER_TEMP/smoke.sh" "${{ steps.find.outputs.apk }}"

      - name: Post the report on the PR
        if: steps.find.outputs.apk != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f report.env ]; then
            body="🟡 **☀ Inspector's smoke test — no verdict.** The emulator flaked before finishing (advisory only, doesn't block)."
          else
            source report.env
            if [ "$INSTALL" != "ok" ]; then
              body="🔴 **☀ Inspector's smoke test — failed.** The app **would not install** on an emulated Android 11 tablet."
            elif [ "$MONKEY" = "crashed" ] || [ "${FATALS:-0}" -gt 0 ]; then
              body="🔴 **☀ Inspector's smoke test — failed.** The app **crashed** under 1500 random taps (fatal exceptions: ${FATALS:-?}). Worth a look before shelving."
            elif [ -n "$MEM_MB" ] && [ "$MEM_MB" -gt 400 ]; then
              body="🟡 **☀ Inspector's smoke test — passed, with a flag.** Installed and survived 1500 random taps, but used ${MEM_MB} MB of memory — that is a lot for a homebrew app."
            else
              mem_note=""
              [ -n "$MEM_MB" ] && mem_note=" Memory in use while poked: ${MEM_MB} MB."
              body="🟢 **☀ Inspector's smoke test — passed.** Installed cleanly and survived 1500 random taps on an emulated tablet without crashing.$mem_note"
            fi
          fi
          gh pr comment "$PR_NUMBER" --body "$body"
