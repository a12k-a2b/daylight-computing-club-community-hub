name: Inspector — crash and memory smoke test

# Advisory only: installs a submitted APK on an emulated Android tablet,
# pokes it with 1500 random inputs (monkey), and reports crashes and
# memory use. It can flake (emulators do) — it never blocks.
#
# Two ways in:
#   - pr:    review a shelve PR before a keeper merges (report on the PR)
#   - issue + apk: post-hoc audit of a trusted member's auto-shelved dish —
#     it's already on the shelf; the report lands on the submission issue

on:
  pull_request:
    paths: ["site/apps/**"]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to smoke-test (robot-created PRs can't trigger pull_request workflows)"
        required: false
      issue:
        description: "Submission issue for a post-hoc audit of a trusted shelving"
        required: false
      apk:
        description: "Path of the shelved APK on master (issue mode), e.g. site/apps/x/x.apk"
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
  ISSUE_NUMBER: ${{ inputs.issue }}
  APK_PATH: ${{ inputs.apk }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stash the inspector script from master
        # before switching to the PR branch: the PR may predate smoke.sh —
        # and we never run a submission's own copy of the inspector anyway
        run: cp .github/scripts/smoke.sh "$RUNNER_TEMP/smoke.sh"

      - name: Check out the PR branch
        if: env.ISSUE_NUMBER == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Find the submitted APK
        id: find
        run: |
          if [ -n "$APK_PATH" ]; then
            # post-hoc audit: the shelve robot told us exactly which dish
            apk="$APK_PATH"
          else
            # checkout above already fetched full history — a shallow re-fetch
            # here would erase the merge base and make the diff come up empty
            apk=$(git diff --name-only origin/master...HEAD -- 'site/apps/*/*.apk' | head -1)
          fi
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "Found: ${apk:-nothing}"

      - name: Enable KVM for the emulator
        if: steps.find.outputs.apk != ''
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install and poke it on an emulated tablet
        if: steps.find.outputs.apk != ''
        id: poke
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          disable-animations: true
          # one line on purpose: the runner executes each script line in its
          # own shell, so all real logic lives in smoke.sh (master's copy,
          # stashed before the PR checkout)
          script: bash "$RUNNER_TEMP/smoke.sh" "${{ steps.find.outputs.apk }}"

      - name: Keep the monkey's notes (stack traces for any red verdict)
        if: steps.find.outputs.apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            monkey.log
            logcat.txt
          if-no-files-found: ignore

      - name: Post the report
        if: steps.find.outputs.apk != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f report.env ]; then
            body="🟡 **☀ Inspector's smoke test — no verdict.** The emulator flaked before finishing (advisory only, doesn't block)."
          else
            source report.env
            if [ "$INSTALL" != "ok" ]; then
              body="🔴 **☀ Inspector's smoke test — failed.** The app **would not install** on an emulated Android 11 tablet."
            elif [ "${FATALS:-0}" -gt 0 ]; then
              # the only red for a crash is a crash IN THIS APP — the monkey no
              # longer aborts for bystanders, and fatals are billed per-process
              body="🔴 **☀ Inspector's smoke test — failed.** The app **crashed** under 1500 random taps (fatal exceptions in this app: ${FATALS}). The smoke-logs artifact on the workflow run has the stack trace."
            elif [ "${ANRS:-0}" -gt 0 ]; then
              body="🟡 **☀ Inspector's smoke test — passed, with a flag.** No crashes, but the app **stopped responding to input** ${ANRS} time(s) under the poke. CI emulators are slow, so this can be the runner's fault rather than the app's — the smoke-logs artifact has the trace."
            elif [ "$MONKEY" != "survived" ]; then
              body="🟡 **☀ Inspector's smoke test — no full verdict.** The app didn't crash, but the poke was cut short (emulator flake). Advisory only, doesn't block."
            elif [ -n "$MEM_MB" ] && [ "$MEM_MB" -gt 400 ]; then
              body="🟡 **☀ Inspector's smoke test — passed, with a flag.** Installed and survived 1500 random taps, but used ${MEM_MB} MB of memory — that is a lot for a homebrew app."
            else
              # plain if, not `[ ] && …` — this step runs under bash -e, and a
              # failed && list here killed the step before it could comment
              mem_note=""
              if [ -n "$MEM_MB" ]; then mem_note=" Memory in use while poked: ${MEM_MB} MB."; fi
              other_note=""
              if [ "${OTHER_FATALS:-0}" -gt 0 ] || [ "${OTHER_ANRS:-0}" -gt 0 ]; then other_note=" (Something else on the emulator — not this dish — crashed or stalled during the poke; the smoke-logs artifact has details.)"; fi
              body="🟢 **☀ Inspector's smoke test — passed.** Installed cleanly and survived 1500 random taps on an emulated tablet without crashing.$mem_note$other_note"
            fi
          fi
          if [ -n "$ISSUE_NUMBER" ]; then
            body="$body (Post-hoc audit — this dish is already on the shelf; if it's 🔴 a keeper can pull it, see RECALL.md.)"
            gh issue comment "$ISSUE_NUMBER" --body "$body"
          else
            gh pr comment "$PR_NUMBER" --body "$body"
          fi
